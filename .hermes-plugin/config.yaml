# Apple Notes MCP server — configuration for NousResearch's Hermes Agent.
# Docs: https://hermes-agent.nousresearch.com/docs/user-guide/features/mcp/
#
# Hermes has no third-party plugin/marketplace drop-in. Register the server
# one of two ways:
#
#   1. CLI (recommended):
#        hermes mcp add apple-notes --command npx --args -y apple-notes-mcp
#
#   2. Manual: merge the mcp_servers block below into ~/.hermes/config.yaml,
#      then restart your Hermes session.
#
# Requires macOS (drives Apple Notes via AppleScript) and Node.js 18+ (npx
# fetches the published apple-notes-mcp package).
mcp_servers:
  apple-notes:
    command: npx
    args:
      - "-y"
      - "apple-notes-mcp"
